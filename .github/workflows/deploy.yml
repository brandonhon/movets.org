name: Deploy Infrastructure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'worker/**'

jobs:
  terraform:
    name: Deploy Terraform
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'terraform/') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_brevo_api_key: ${{ secrets.BREVO_API_KEY }}
          TF_VAR_turnstile_site_key: ${{ vars.TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ secrets.TURNSTILE_SECRET_KEY }}
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_brevo_api_key: ${{ secrets.BREVO_API_KEY }}
          TF_VAR_turnstile_site_key: ${{ vars.TURNSTILE_SITE_KEY }}
          TF_VAR_turnstile_secret_key: ${{ secrets.TURNSTILE_SECRET_KEY }}
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}

  worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'worker/') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd worker && npm ci

      - name: Deploy Worker
        run: cd worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
