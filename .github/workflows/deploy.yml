name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'worker/**'
      - 'site/**'
      - 'scripts/inject-env.js'
      - 'tailwind.config.js'
      - 'tailwind.css'
      - 'package.json'

jobs:
  terraform:
    name: Deploy Terraform
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'terraform/') ||
      contains(toJSON(github.event.commits.*.added), 'terraform/')
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_brevo_api_key: ${{ secrets.BREVO_API_KEY }}
          TF_VAR_turnstile_secret_key: ${{ secrets.TURNSTILE_SECRET_KEY }}
          TF_VAR_cf_analytics_token: ${{ vars.CF_ANALYTICS_TOKEN }}
          TF_VAR_workers_subdomain: ${{ vars.WORKERS_SUBDOMAIN }}
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_brevo_api_key: ${{ secrets.BREVO_API_KEY }}
          TF_VAR_turnstile_secret_key: ${{ secrets.TURNSTILE_SECRET_KEY }}
          TF_VAR_cf_analytics_token: ${{ vars.CF_ANALYTICS_TOKEN }}
          TF_VAR_workers_subdomain: ${{ vars.WORKERS_SUBDOMAIN }}
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}

  worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'worker/') ||
      contains(toJSON(github.event.commits.*.added), 'worker/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd worker && npm ci

      - name: Deploy Worker
        run: cd worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
